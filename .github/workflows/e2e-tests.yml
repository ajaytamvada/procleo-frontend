name: E2E Tests (UAT)

on:
  # Run after deployment completes
  workflow_run:
    workflows: ["Azure Static Web Apps CI/CD"]
    types: [completed]
    branches: [main]
  # Manual trigger - run anytime from GitHub UI
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Base URL to test against'
        required: false
        default: 'https://ashy-rock-0fdba8c1e.4.azurestaticapps.net'

env:
  BASE_URL: ${{ github.event.inputs.base_url || 'https://ashy-rock-0fdba8c1e.4.azurestaticapps.net' }}

jobs:
  e2e-tests:
    # Skip if deployment failed
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests against UAT
        run: npx playwright test
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 30
